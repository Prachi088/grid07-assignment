services:
  postgres:
    image: postgres:15
    container_name: grid07_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grid07db
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: grid07_redis
    ports:
      - "6379:6379"